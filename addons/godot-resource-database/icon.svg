<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d6b99"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="16" ry="16" fill="url(#bg)"/>
  <!-- Grid lines (database rows) -->
  <rect x="20" y="28" width="88" height="8" rx="2" fill="#ffffff" opacity="0.85"/>
  <rect x="20" y="44" width="88" height="8" rx="2" fill="#ffffff" opacity="0.65"/>
  <rect x="20" y="60" width="88" height="8" rx="2" fill="#ffffff" opacity="0.50"/>
  <rect x="20" y="76" width="88" height="8" rx="2" fill="#ffffff" opacity="0.35"/>
  <!-- Resource diamond -->
  <polygon points="64,90 78,104 64,118 50,104" fill="#5dade2" stroke="#ffffff" stroke-width="2" opacity="0.90"/>
  <!-- Table header indicator -->
  <rect x="20" y="28" width="24" height="8" rx="2" fill="#5dade2" opacity="0.90"/>
</svg>
